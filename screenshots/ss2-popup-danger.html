<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SS2 — Popup HIGH RISK</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 1280px; height: 800px; overflow: hidden;
  background: #09090b;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}
/* Browser chrome */
.bc {
  height: 46px; background: #1c1c1e; border-bottom: 1px solid #2a2a2e;
  display: flex; align-items: center; padding: 0 16px; gap: 10px; position: relative;
}
.dots { display: flex; gap: 6px; }
.dot { width: 12px; height: 12px; border-radius: 50%; }
.dr{background:#ff5f57;}.dy{background:#febc2e;}.dg{background:#28c840;}
.urlbar {
  flex: 1; height: 26px; background: #2a2a2e; border-radius: 6px;
  display: flex; align-items: center; padding: 0 10px; gap: 6px;
  color: #9aa3ad; font-size: 12px;
}
.lock { color: #4ade80; }
.ext-wrap { position: relative; }
.ext-icon {
  width: 26px; height: 26px; background: linear-gradient(135deg,#6366F1,#a78bfa);
  border-radius: 6px; display: flex; align-items: center; justify-content: center;
  font-size: 13px; outline: 2px solid rgba(99,102,241,.6); outline-offset: 2px;
}

/* Blurred bg page */
.bg {
  position: absolute; inset: 46px 0 0 0;
  background: #09090b;
  background-image: repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(255,255,255,.02) 41px),
    repeating-linear-gradient(90deg,transparent,transparent 200px,rgba(255,255,255,.015) 201px);
}

/* Popup float */
.popup-wrap {
  position: absolute; top: 52px; right: 14px;
  filter: drop-shadow(0 24px 60px rgba(0,0,0,.9));
}
.popup-caret {
  width: 0; height: 0;
  border-left: 7px solid transparent; border-right: 7px solid transparent;
  border-bottom: 7px solid #1a1a1f;
  margin-left: auto; margin-right: 7px;
}

/* ── POPUP — exact styles from popup.html ── */
.popup {
  width: 320px; background: #09090b; color: #f4f4f5;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  padding: 0 0 16px;
  border-radius: 14px; border: 1px solid #27272a; overflow: hidden;
}
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 16px 12px; border-bottom: 1px solid rgba(255,255,255,.06);
  background: #0d0d10;
}
.logo { display: flex; align-items: center; gap: 8px; }
.logo-shield { font-size: 20px; }
.logo-text { font-size: 14px; font-weight: 900; letter-spacing: 1.5px; color: #f4f4f5; }
.logo-text span { color: #6366F1; }
.open-btn {
  font-size: 11px; color: #6366F1; background: rgba(99,102,241,.12);
  border: 1px solid rgba(99,102,241,.25); border-radius: 6px;
  padding: 4px 10px; cursor: pointer; font-weight: 700;
}
.input-wrap { padding: 14px 16px 0; }
.input-row { display: flex; gap: 8px; }
input {
  flex: 1; background: #18181b; border: 1px solid rgba(255,255,255,.08);
  border-radius: 10px; padding: 9px 12px; color: #f4f4f5;
  font-size: 12px; font-family: 'SF Mono','JetBrains Mono',monospace; outline: none;
}
.scan-btn {
  background: #6366F1; border: none; border-radius: 10px; color: #fff;
  font-size: 12px; font-weight: 800; padding: 9px 14px; cursor: pointer;
}

/* Result card */
.result {
  margin: 12px 16px 0; background: #131316;
  border: 1px solid rgba(255,255,255,.06); border-radius: 14px; overflow: hidden;
}
.result-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 14px; border-bottom: 1px solid rgba(255,255,255,.05);
}
.result-name { font-size: 13px; font-weight: 700; color: #f4f4f5; }
.result-network { font-size: 10px; color: #52525b; font-weight: 600; letter-spacing: .5px; }
.risk-badge {
  display: inline-block; padding: 2px 10px; border-radius: 20px;
  font-size: 10px; font-weight: 800; border: 1px solid; letter-spacing: .5px;
  color: #EF4444; border-color: rgba(239,68,68,.33); background: rgba(239,68,68,.12);
}
.result-body {
  padding: 14px; display: flex; align-items: center; gap: 14px;
}
.score-circle {
  width: 64px; height: 64px; border-radius: 50%; border: 3px solid #EF4444;
  display: flex; flex-direction: column; align-items: center; justify-content: center; flex-shrink: 0;
}
.score-num { font-size: 22px; font-weight: 900; line-height: 1; color: #EF4444; }
.score-denom { font-size: 9px; color: #52525b; }
.result-details { flex: 1; display: flex; flex-direction: column; gap: 5px; }
.detail-row { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #71717a; }
.dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.result-actions { padding: 0 14px 14px; display: flex; gap: 8px; }
.action-btn {
  flex: 1; padding: 9px; border-radius: 10px; font-size: 12px; font-weight: 700;
  cursor: pointer; border: 1px solid rgba(255,255,255,.08);
  background: rgba(255,255,255,.04); color: #f4f4f5; text-align: center;
}
.action-btn.primary { background: #6366F1; border-color: #6366F1; color: #fff; }

/* Recent */
.section-title {
  padding: 14px 16px 8px; font-size: 10px; font-weight: 700;
  letter-spacing: 1.5px; color: #52525b;
}
.recent-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 16px; cursor: pointer;
}
.recent-addr {
  flex: 1; font-size: 11px; color: #71717a;
  font-family: 'SF Mono',monospace;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.recent-score { font-size: 13px; font-weight: 800; flex-shrink: 0; }
.footer {
  margin-top: 14px; padding: 0 16px;
  display: flex; justify-content: space-between; align-items: center;
}
.footer-text { font-size: 10px; color: #3f3f46; }
.footer-link { font-size: 10px; color: #52525b; background: none; border: none; cursor: pointer; text-decoration: underline; }
</style>
</head>
<body>

<div class="bc">
  <div class="dots"><div class="dot dr"></div><div class="dot dy"></div><div class="dot dg"></div></div>
  <div class="urlbar"><span class="lock">🔒</span> bscscan.com/token/0xb8c77482e45f1f44de1745f52c74426c631bdd52</div>
  <div class="ext-wrap">
    <div class="ext-icon">🛡</div>
  </div>
</div>

<div class="popup-wrap">
  <div class="popup-caret"></div>
  <div class="popup">
    <div class="header">
      <div class="logo">
        <span class="logo-shield">🛡</span>
        <span class="logo-text">Trust<span>Scan</span></span>
      </div>
      <button class="open-btn">Open App ↗</button>
    </div>

    <div class="input-wrap">
      <div class="input-row">
        <input value="0xb8c77482e45f1f44de1745f52c74426c631bdd52" readonly>
        <button class="scan-btn">Scan</button>
      </div>
    </div>

    <div class="result">
      <div class="result-header">
        <div>
          <div class="result-name">SAFEMOON2</div>
          <div class="result-network">BSC</div>
        </div>
        <div class="risk-badge">HIGH RISK</div>
      </div>
      <div class="result-body">
        <div class="score-circle">
          <div class="score-num">8</div>
          <div class="score-denom">/100</div>
        </div>
        <div class="result-details">
          <div class="detail-row"><span class="dot" style="background:#EF4444"></span><span>Honeypot detected</span></div>
          <div class="detail-row"><span class="dot" style="background:#EF4444"></span><span>Sell transactions disabled</span></div>
          <div class="detail-row"><span class="dot" style="background:#EF4444"></span><span>Liquidity: $4.2k</span></div>
        </div>
      </div>
      <div class="result-actions">
        <button class="action-btn primary">Full Analysis ↗</button>
        <button class="action-btn">Copy Link</button>
      </div>
    </div>

    <div class="section-title">RECENT SCANS</div>
    <div class="recent-item">
      <span class="recent-addr">SAFEMOON2 (0xb8c774…dd52)</span>
      <span class="recent-score" style="color:#EF4444">8</span>
    </div>
    <div class="recent-item">
      <span class="recent-addr">USDC (0xa0b869…eb48)</span>
      <span class="recent-score" style="color:#10B981">81</span>
    </div>
    <div class="recent-item">
      <span class="recent-addr">WOJAK (0x5026f0…c9aA)</span>
      <span class="recent-score" style="color:#F59E0B">54</span>
    </div>

    <div class="footer">
      <span class="footer-text">TrustScan v1.0 · trustscan.app</span>
      <button class="footer-link">Clear cache</button>
    </div>
  </div>
</div>

</body>
</html>
